<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PE YouTube Filter</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px 14px 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1c1c1c;
      background: #fff;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
      font-weight: 600;
    }
    .modes {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .mode-btn {
      padding: 8px 10px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: inherit;
      transition: background 0.1s, border-color 0.1s;
    }
    .mode-btn:hover { background: #ececec; }
    .mode-btn.active {
      background: #c81e1e;
      color: #fff;
      border-color: #a61717;
    }
    .mode-btn .mode-label { font-weight: 600; }
    .mode-btn .mode-hint {
      display: block;
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* Counter — clickable when there are filtered channels */
    .counter-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 10px;
      background: #f2f2f2;
      border: none;
      border-radius: 4px;
      margin-bottom: 4px;
      font: inherit;
      font-size: 12px;
      color: inherit;
      cursor: default;
      text-align: left;
    }
    .counter-btn.has-channels {
      cursor: pointer;
    }
    .counter-btn.has-channels:hover { background: #e8e8e8; }
    .counter-btn strong { font-weight: 600; }
    .counter-arrow { font-size: 10px; color: #888; transition: transform 0.15s; }
    .counter-arrow.open { transform: rotate(180deg); }

    /* Filtered channels list */
    .channel-list {
      margin-bottom: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }
    .channel-list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .channel-list-item:last-child { border-bottom: none; }
    .channel-list-info { flex: 1; min-width: 0; }
    .channel-list-name {
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-list-owner {
      font-size: 10px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ignore-btn {
      flex-shrink: 0;
      font: inherit;
      font-size: 10px;
      padding: 3px 7px;
      border: 1px solid #c81e1e;
      background: #fff;
      color: #c81e1e;
      border-radius: 3px;
      cursor: pointer;
    }
    .ignore-btn:hover { background: #fff0f0; }

    /* Whitelist section */
    .whitelist-toggle {
      font: inherit;
      font-size: 11px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 10px;
      text-decoration: underline;
    }
    .whitelist-toggle:hover { color: #555; }
    .whitelist-list {
      margin-bottom: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }
    .whitelist-empty {
      padding: 8px 10px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
    .whitelist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 11px;
    }
    .whitelist-item:last-child { border-bottom: none; }
    .whitelist-item-key { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #444; }
    .unignore-btn {
      flex-shrink: 0;
      font: inherit;
      font-size: 10px;
      padding: 3px 7px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      color: #333;
      border-radius: 3px;
      cursor: pointer;
    }
    .unignore-btn:hover { background: #ececec; }

    .report-btn {
      display: block;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #c81e1e;
      background: #fff;
      color: #c81e1e;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      transition: background 0.1s;
    }
    .report-btn:hover { background: #fff0f0; }
    footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 10px;
      color: #888;
      text-align: center;
    }
    .refresh-link {
      font-size: 10px;
      color: #555;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      font-family: inherit;
    }
    .refresh-link:hover { color: #c81e1e; }
  </style>
</head>
<body>
  <h1>PE YouTube Filter</h1>

  <div class="modes" role="radiogroup" aria-label="Display mode">
    <button class="mode-btn" data-mode="hide" role="radio">
      <span class="mode-label">Hide entirely</span>
      <span class="mode-hint">Remove matching cards from the page</span>
    </button>
    <button class="mode-btn" data-mode="label" role="radio">
      <span class="mode-label">Show with label</span>
      <span class="mode-hint">Tag matching cards with the owner name</span>
    </button>
    <button class="mode-btn" data-mode="off" role="radio">
      <span class="mode-label">Show normally</span>
      <span class="mode-hint">Disable filtering on this session</span>
    </button>
  </div>

  <button class="counter-btn" id="counter-btn" aria-expanded="false">
    <span><strong id="count">0</strong> channels filtered on this page</span>
    <span class="counter-arrow" id="counter-arrow">▼</span>
  </button>

  <div id="channel-list" class="channel-list" hidden></div>

  <button class="whitelist-toggle" id="whitelist-toggle" hidden>Ignored channels (<span id="whitelist-count">0</span>)</button>
  <div id="whitelist-list" class="whitelist-list" hidden></div>

  <button class="report-btn" id="report-btn">Report a channel</button>

  <footer>
    Channel list auto-updated weekly from GitHub &middot;
    <button class="refresh-link" id="refresh-btn" type="button">refresh now</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
