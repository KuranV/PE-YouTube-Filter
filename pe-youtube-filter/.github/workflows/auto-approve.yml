name: Auto-approve reported channels

on:
  schedule:
    # Every day at 03:17 UTC (offset from the hour to avoid GH cron congestion).
    - cron: '17 3 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/auto-approve.yml'
      - 'scripts/auto-approve.mjs'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-approval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          APPROVAL_THRESHOLD: '10'
        run: node scripts/auto-approve.mjs

      - name: Commit updated channels.json
        run: |
          if git diff --quiet channels.json; then
            echo "No channel list changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git commit -m "chore: auto-approve new channels [skip ci]"
          git push
